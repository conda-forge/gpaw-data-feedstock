{% set name = "gpaw-data" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gpaw_data-{{ version }}.tar.gz
  sha256: 28212110aa04daae333ef1260b281d70b818ad9cf4282078624ee3fc7a8fc05c

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage('gpaw-data', max_pin='x.x.x') }}

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  commands:
    - test -f ${SP_DIR}/gpaw_data/setups/Ag.11.GLLBSC.gz
